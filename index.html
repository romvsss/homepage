<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="css/style.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css"
        integrity="sha512-NhSC1YmyruXifcj/KFRWoC561YpHpc5Jtzgvbuzx5VozKpWvQ+4nXhPdFgmx8xqexRcpAglTj9sIBWINXa8x5w=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="css/form.css" rel="stylesheet">
    <script defer src="js/script.js"></script>
    <title>strona testowa</title>
</head>

<body>
    <form class="form">
        <fieldset class="form__fieldset">
            <legend class="form__legend">Dane osobowe</legend>
            <p>
                <label>
                    <span class="form__labelText"> Imię: </span>
                    <input class="form__field" name="firstName" required></label>
            </p>
            <p>
                <label>
                    <span class="form__labelText"> Nazwisko: </span> <input class="form__field" name="lastName"
                        required></label>
            </p>
        </fieldset>
        <p>
            <button class="form__button">Wyślij!</button>
        </p>
    </form>
    <form class="form form__bmi">
        <fieldset class="form__fieldset form__fieldsetBmi">
            <legend class="form__legend">Sprawdź swoje BMI!</legend>
            <p>
                <label>
                    <span class="form__labelText"> Twój wzrost: </span>
                    <input type="number" class="form__field form__field--number js-height" name="height" required
                        min="1" step="any">
                </label>
            </p>
            <p>
                <label>
                    <span class="form__labelText"> Twoja waga: </span> <input type="number"
                        class="form__field form__field--number js-weight" name="weight" required min="1" step="any">
                </label>
            </p>
        </fieldset>
        <p>
            <button class="form__button form__buttonBmi">Wyślij!</button>
        </p>
    </form>
    <p><span class="textBmi">Twoje BMI wynosi: <strong class="js-bmi">N/A</strong></span> </p>
</body>

</html>
